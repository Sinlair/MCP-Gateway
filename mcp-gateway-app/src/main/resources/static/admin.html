<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Gateway 工作台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<header class="navbar navbar-expand-md sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="#">
            <i class="bi bi-hdd-network-fill"></i> MCP Gateway
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="navbar-nav ms-auto d-flex align-items-center">
            <div class="nav-item text-nowrap d-flex align-items-center gap-3 pe-3">
                <span class="text-muted small" id="authSummaryLabel"><i class="bi bi-person-circle"></i> Workspace</span>
                <a class="nav-link text-danger d-flex align-items-center gap-1" href="#" id="logoutBtn">
                    <i class="bi bi-box-arrow-right"></i> 退出
                </a>
            </div>
        </div>
    </div>
</header>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="sidebar-sticky">
                <ul class="nav flex-column mb-4">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-target="dashboard">
                            <i class="bi bi-speedometer2"></i> 控制台
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="mcp-lab">
                            <i class="bi bi-broadcast"></i> MCP 实验室
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="big-market">
                            <i class="bi bi-joystick"></i> big-market 操作台
                        </a>
                    </li>
                </ul>

                <h6 class="sidebar-heading px-3 mb-2">
                    <span>配置与治理</span>
                </h6>
                <ul class="nav flex-column mb-4">
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="upstreams">
                            <i class="bi bi-hdd-stack"></i> 上游资源
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="tools">
                            <i class="bi bi-tools"></i> 工具目录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="policies">
                            <i class="bi bi-shield-lock"></i> 访问策略
                        </a>
                    </li>
                </ul>

                <div class="workspace-note mx-3 mt-4">
                    <h6 class="mb-2">工作台说明</h6>
                    <p class="mb-0">
                        这个工作台直接借鉴 `ai-mcp-gateway` 的结构，但把任务流改成更适合当前仓库：
                        先看状态，再做调用，最后才配置。
                    </p>
                </div>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 main-content" id="main-content-wrapper"></main>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body d-flex align-items-center gap-2" id="toastMessage">
                <i class="bi bi-check-circle-fill"></i>
                <span>操作成功</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/config.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>
