<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">控制台概览</h1>
    <div class="text-muted small">
        <i class="bi bi-calendar3"></i> <span id="current-date"></span>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">上游总数</h5>
                    <i class="bi bi-hdd-stack fs-2 opacity-50"></i>
                </div>
                <h2 class="display-4 mb-0" id="stat-total-upstreams">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">可路由上游</h5>
                    <i class="bi bi-signpost-split fs-2 opacity-50"></i>
                </div>
                <h2 class="display-4 mb-0" id="stat-routable-upstreams">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">可见工具</h5>
                    <i class="bi bi-tools fs-2 opacity-50"></i>
                </div>
                <h2 class="display-4 mb-0" id="stat-discoverable-tools">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">当前环境</h5>
                    <i class="bi bi-layers fs-2 opacity-50"></i>
                </div>
                <h2 class="display-6 mb-0" id="stat-environment">dev</h2>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-7 mb-4">
        <div class="card h-100">
            <div class="card-header d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-activity text-success"></i> 当前工作台状态
                </div>
                <button class="btn btn-outline-primary btn-sm" id="refreshDashboardBtn">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
            <div class="card-body">
                <div class="mini-stat">
                    <div>
                        <div class="text-muted small">当前身份</div>
                        <strong id="dashboard-profile">-</strong>
                    </div>
                    <span class="badge bg-primary-subtle text-primary" id="dashboard-mode">控制台</span>
                </div>
                <div class="mini-stat">
                    <div>
                        <div class="text-muted small">当前调用方</div>
                        <strong id="dashboard-caller">-</strong>
                    </div>
                    <code id="dashboard-request-id">-</code>
                </div>
                <div class="mini-stat">
                    <div>
                        <div class="text-muted small">Token 过期时间</div>
                        <strong id="dashboard-expire-time">-</strong>
                    </div>
                    <span class="text-muted small" id="dashboard-request-tip">请求号会随最新接口响应更新</span>
                </div>
                <div class="mt-4">
                    <div class="text-muted small mb-2">当前权限摘要</div>
                    <div id="dashboard-scope-badges"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-5 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <i class="bi bi-signpost-2 me-2"></i> 下一步建议
            </div>
            <div class="card-body">
                <div id="dashboard-priority-list" class="d-grid gap-3"></div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex align-items-center gap-2">
        <i class="bi bi-view-list"></i> 已启用上游健康状态
    </div>
    <div class="card-body">
        <div class="metric-grid" id="dashboard-upstream-grid"></div>
    </div>
</div>
