<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">工具目录</h1>
    <div>
        <button class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1 me-2" id="refreshToolsBtn">
            <i class="bi bi-arrow-clockwise"></i> 刷新数据
        </button>
        <button class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" data-bs-toggle="modal" data-bs-target="#toolModal">
            <i class="bi bi-plus-lg"></i> 新增工具
        </button>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form id="form-tool-search" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label text-muted small mb-1">服务编码</label>
                <input type="text" class="form-control form-control-sm" id="search-tool-server" placeholder="请输入服务编码">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted small mb-1">工具名称</label>
                <input type="text" class="form-control form-control-sm" id="search-tool-name" placeholder="请输入工具名称">
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary btn-sm me-2"><i class="bi bi-search"></i> 筛选</button>
                <button type="button" class="btn btn-light btn-sm" id="resetToolSearchBtn"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>工具标识</th>
                    <th>服务编码</th>
                    <th>描述</th>
                    <th>输入 Schema</th>
                    <th>状态</th>
                </tr>
                </thead>
                <tbody id="toolTableBody">
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">
                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                        加载中...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="toolModal" tabindex="-1" aria-labelledby="toolModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="toolModalLabel"><i class="bi bi-tools me-2"></i>新增工具定义</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="toolForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">服务编码 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="serverCode" required placeholder="如 weather">
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <label class="form-label">工具名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="toolName" required placeholder="如 forecast">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">工具描述</label>
                        <input type="text" class="form-control" name="description" placeholder="简要描述这个工具做什么">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">输入 Schema</label>
                        <textarea class="form-control font-monospace" name="inputSchema" rows="7" placeholder='{"city":"string","days":"integer"}'></textarea>
                        <div class="form-text">支持简化 JSON，也支持标准 JSON Schema。</div>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" role="switch" id="tool-enabled" name="enabled" checked>
                        <label class="form-check-label" for="tool-enabled">创建后立即启用</label>
                    </div>
                    <div class="modal-footer px-0 pb-0 border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-1">
                            <i class="bi bi-check2-circle"></i> 保存配置
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
