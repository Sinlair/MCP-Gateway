<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">网关测试</h1>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-1" id="openMcpHistoryBtn">
            <i class="bi bi-clock-history"></i> 调用历史
        </button>
        <button class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1" id="reloadMcpLabBtn">
            <i class="bi bi-arrow-clockwise"></i> 重置连接
        </button>
    </div>
</div>

<div class="row">
    <div class="col-lg-4 mb-4">
        <div class="card">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-broadcast me-2"></i>MCP 连接</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">当前环境</label>
                    <input type="text" class="form-control" id="mcpEnvironment" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">连接地址</label>
                    <div class="endpoint-preview text-muted border rounded p-3 bg-light" id="mcpEndpointPreview">-</div>
                </div>
                <div class="mb-3">
                    <span class="status-indicator">
                        <span class="status-dot" id="mcpStatusDot"></span>
                        <span id="mcpStatusText">未连接</span>
                    </span>
                </div>
                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-primary" id="mcpConnectBtn">
                        <i class="bi bi-plug me-1"></i>连接 SSE
                    </button>
                    <button type="button" class="btn btn-outline-primary" id="mcpInitializeBtn">
                        <i class="bi bi-play-circle me-1"></i>发送 initialize
                    </button>
                    <button type="button" class="btn btn-outline-secondary" id="mcpListToolsBtn">
                        <i class="bi bi-list-ul me-1"></i>拉取 tools/list
                    </button>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-joystick me-2"></i>big-market 操作</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <button class="btn btn-outline-primary btn-sm w-100" id="refreshBigMarketBtn">
                        <i class="bi bi-arrow-clockwise"></i> 刷新系统状态
                    </button>
                </div>
                <div class="metric-grid mb-3" id="bigMarketOverviewGrid"></div>
                <form id="bigMarketForm">
                    <div class="row mb-3">
                        <div class="col-12 mb-3">
                            <label class="form-label">活动 ID</label>
                            <input type="number" class="form-control" id="bmActivityId" value="100301">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">策略 ID</label>
                            <input type="number" class="form-control" id="bmStrategyId" value="100001">
                        </div>
                        <div class="col-12">
                            <label class="form-label">用户 ID</label>
                            <input type="text" class="form-control" id="bmUserId" value="xiaofuge">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-outline-primary" id="bmActivityArmory">活动装配</button>
                        <button type="button" class="btn btn-outline-primary" id="bmStrategyArmory">策略装配</button>
                        <button type="button" class="btn btn-outline-primary" id="bmAwardList">查询奖品列表</button>
                        <button type="button" class="btn btn-outline-primary" id="bmUserAccount">查询活动账户</button>
                        <button type="button" class="btn btn-primary" id="bmDraw">执行抽奖</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-8 mb-4">
        <div class="card h-100 mb-4">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-tools me-2"></i>工具调用</h5>
                <span class="text-muted small">连接、发现、调用都在这里完成</span>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">已发现工具</label>
                    <select class="form-select" id="mcpToolSelect">
                        <option value="">请先连接并加载工具列表...</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">输入 Schema</label>
                        <pre class="schema-preview mb-0" id="mcpSchemaPreview">{}</pre>
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">参数 JSON</label>
                        <textarea class="form-control font-monospace" id="mcpArgumentsInput" rows="12">{}</textarea>
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-primary" id="mcpCallToolBtn">
                        <i class="bi bi-send me-1"></i>执行 tools/call
                    </button>
                </div>
                <div class="result-panel">
                    <pre class="mb-0" id="mcpResultOutput">MCP 调用结果会显示在这里。</pre>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-chat-square-text me-2"></i>消息流</h5>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="clearMcpTrafficBtn">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="history-window" id="mcpTrafficWindow">
                    <div class="text-center text-muted py-5" id="mcpTrafficPlaceholder">
                        <i class="bi bi-broadcast-pin fs-3 d-block mb-2"></i>
                        还没有 MCP 消息。先建立 SSE 连接，再执行 initialize 或 tools/call。
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-terminal me-2"></i>big-market 返回结果</h5>
            </div>
            <div class="card-body">
                <div class="result-panel">
                    <pre class="mb-0" id="bigMarketResult">big-market 操作结果会显示在这里。</pre>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="mcpHistoryModal" tabindex="-1" aria-labelledby="mcpHistoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="mcpHistoryModalLabel"><i class="bi bi-clock-history me-2"></i>MCP 调用历史</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                        <tr>
                            <th style="width: 170px;">时间</th>
                            <th style="width: 160px;">方法</th>
                            <th>摘要</th>
                            <th style="width: 90px;">状态</th>
                        </tr>
                        </thead>
                        <tbody id="mcpHistoryTableBody">
                        <tr>
                            <td colspan="4" class="text-center text-muted py-3">暂无调用历史</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-outline-danger btn-sm" id="clearMcpHistoryBtn">
                    <i class="bi bi-trash me-1"></i> 清空历史
                </button>
            </div>
        </div>
    </div>
</div>
