<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">上游资源</h1>
    <div>
        <button class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1 me-2" id="refreshUpstreamsBtn">
            <i class="bi bi-arrow-clockwise"></i> 刷新数据
        </button>
        <button class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" data-bs-toggle="modal" data-bs-target="#upstreamModal">
            <i class="bi bi-plus-lg"></i> 新增上游
        </button>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form id="form-upstream-search" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label text-muted small mb-1">服务编码</label>
                <input type="text" class="form-control form-control-sm" id="search-upstream-code" placeholder="请输入服务编码">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted small mb-1">显示名称</label>
                <input type="text" class="form-control form-control-sm" id="search-upstream-name" placeholder="请输入显示名称">
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary btn-sm me-2"><i class="bi bi-search"></i> 筛选</button>
                <button type="button" class="btn btn-light btn-sm" id="resetUpstreamSearchBtn"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>服务编码</th>
                    <th>显示名称</th>
                    <th>地址</th>
                    <th>传输 / 认证</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="upstreamTableBody">
                <tr>
                    <td colspan="6" class="text-center text-muted py-4">
                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                        加载中...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="upstreamModal" tabindex="-1" aria-labelledby="upstreamModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="upstreamModalLabel"><i class="bi bi-hdd-network me-2"></i>新增上游服务</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="upstreamForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">服务编码 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="serverCode" required placeholder="如 weather">
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <label class="form-label">显示名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name" required placeholder="如 Weather Server">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">基础地址 <span class="text-danger">*</span></label>
                        <input type="url" class="form-control" name="baseUrl" required placeholder="https://example.com/mcp">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">传输类型</label>
                            <select class="form-select" name="transportType">
                                <option value="HTTP">HTTP</option>
                                <option value="SSE">SSE</option>
                            </select>
                        </div>
                        <div class="col-md-4 mt-3 mt-md-0">
                            <label class="form-label">认证模式</label>
                            <input type="text" class="form-control" name="authMode" value="API_KEY">
                        </div>
                        <div class="col-md-4 mt-3 mt-md-0">
                            <label class="form-label">超时 (ms)</label>
                            <input type="number" class="form-control" name="timeoutMs" value="3000">
                        </div>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" role="switch" id="upstream-enabled" name="enabled" checked>
                        <label class="form-check-label" for="upstream-enabled">创建后立即启用</label>
                    </div>
                    <div class="modal-footer px-0 pb-0 border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-1">
                            <i class="bi bi-check2-circle"></i> 保存配置
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
