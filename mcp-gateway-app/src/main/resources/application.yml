spring:
  application:
    name: mcp-gateway
  datasource:
    url: jdbc:h2:file:./data/mcp-gateway-admin;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:/sql/legacy-gateway-schema.sql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

managed-systems:
  big-market:
    name: big-market-71772-z
    repo-path: "E:\\Internship\\program\\big-market-71772-z"
    base-url: "http://127.0.0.1:8091"
    api-version: v1

mcp:
  console:
    token:
      issuer: mcp-gateway
      secret: local-dev-console-token-secret-change-me
      ttl-hours: 12
      clock-skew-seconds: 30
      audit-retention: 200

mybatis:
  mapper-locations: classpath:/mybatis/legacy/*.xml
